name: Docker Build and Push

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: write

concurrency:
  group: release-and-docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-and-docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Semantic release
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        with:
          extra_plugins: |
            @semantic-release/changelog@6.0.3
            @semantic-release/git@10.0.1
            @semantic-release/npm@12.0.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure app version matches semantic release version
        if: steps.semantic.outputs.new_release_published == 'true'
        env:
          RELEASE_VERSION: ${{ steps.semantic.outputs.new_release_version }}
        run: |
          set -eu
          APP_VERSION="$(node -p "require('./package.json').version")"
          if [ "${APP_VERSION}" != "${RELEASE_VERSION}" ]; then
            echo "package.json version (${APP_VERSION}) does not match release version (${RELEASE_VERSION})"
            exit 1
          fi
          IMAGE_REPOSITORY="$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          echo "APP_VERSION=${APP_VERSION}" >> "$GITHUB_ENV"
          echo "IMAGE=ghcr.io/${IMAGE_REPOSITORY}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        if: steps.semantic.outputs.new_release_published == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: steps.semantic.outputs.new_release_published == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        if: steps.semantic.outputs.new_release_published == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ env.APP_VERSION }}
            ${{ env.IMAGE }}:v${{ env.APP_VERSION }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
