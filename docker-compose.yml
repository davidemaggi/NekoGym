services:
  nekogym:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nekogym
    ports:
      - "3000:3000"
    environment:
      CRON_SECRET: ${CRON_SECRET:-change-me}
      LESSON_RECONCILE_DAILY_AT: ${LESSON_RECONCILE_DAILY_AT:-03:00}
      LESSON_RECONCILE_RUN_ON_STARTUP: ${LESSON_RECONCILE_RUN_ON_STARTUP:-false}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
    volumes:
      # Default: named volume for full data folder (DB + backups).
      - nekogym_data:/app/data
      # Alternative (bind mounts to local folders):
      # - ./data:/app/data
      # Alternative (single DB file + backups subfolder):
      # - ./data/nekogym.db:/app/data/nekogym.db
      # - ./data/backups:/app/data/backups
      # Alternative (named volumes split by subpath):
      # - nekogym_data_db:/app/data
      # - nekogym_data_backups:/app/data/backups
    restart: unless-stopped



volumes:
  nekogym_data:
  # nekogym_data_db:
  # nekogym_data_backups:
