services:
  nekogym:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nekogym
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: file:/data/dev.db
      CRON_SECRET: ${CRON_SECRET:-change-me}
      LESSON_RECONCILE_DAILY_AT: ${LESSON_RECONCILE_DAILY_AT:-03:00}
      LESSON_RECONCILE_RUN_ON_STARTUP: ${LESSON_RECONCILE_RUN_ON_STARTUP:-false}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
    volumes:
      - nekogym_sqlite_data:/data
    restart: unless-stopped

volumes:
  nekogym_sqlite_data:

